# Reusable CI — learner + instructor builds, PDF, PDF gates, quality gates (Story 6.7, AR9).
name: CI build

on:
  workflow_call:
    inputs:
      check_pr_title:
        description: Enforce Conventional Commits on PR title (skipped for push/tag)
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-toolchain
        with:
          install_npm: "true"
          install_chromium: "true"

      - name: Validate PR title (Conventional Commits, AR19)
        if: inputs.check_pr_title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if echo "$TITLE" | grep -qE '^(feat|fix|docs|chore|ci|refactor|lint|content)(\([a-zA-Z0-9._-]+\))?: .+'; then
            echo "OK: PR title matches Conventional Commits."
            exit 0
          fi
          echo "::error::PR title must match Conventional Commits (see CONTRIBUTING.md). Example: docs(ch03): clarify rollback steps"
          echo "Got: $TITLE"
          exit 1

      - name: Authoring lint (warn mode — Epic 4 migration)
        run: make lint

      - name: Build learner site
        run: make build-learner

      - name: Build learner PDF (Story 6.2–6.4)
        run: make pdf

      - name: Install veraPDF (Story 6.5)
        run: bash scripts/ci/install-verapdf-ubuntu.sh

      - name: veraPDF PDF/UA-1 report
        env:
          VERAPDF_NON_BLOCKING: "1"
        run: |
          set -euo pipefail
          V="$(python3 scripts/read_nso_version.py)"
          bash scripts/ci/run_verapdf.sh "dist/cisco-secure-services-nso-${V}.pdf"

      - name: Validate PDF bookmarks (Story 6.5)
        run: |
          set -euo pipefail
          V="$(python3 scripts/read_nso_version.py)"
          python3 scripts/ci/validate-pdf-bookmarks.py "dist/cisco-secure-services-nso-${V}.pdf" \
            --report "bookmark-report-${GITHUB_RUN_ID}.txt"

      - name: External resource allowlist (Story 6.6, FR38/NFR-S3)
        run: |
          set -euo pipefail
          V="$(python3 scripts/read_nso_version.py)"
          python3 scripts/ci/check-external-resources.py site "dist/cisco-secure-services-nso-${V}.pdf"

      - name: Cisco Confidential classification (Story 6.6, AR18/FR23/NFR-S4)
        run: |
          set -euo pipefail
          V="$(python3 scripts/read_nso_version.py)"
          python3 scripts/ci/check-classification.py site "dist/cisco-secure-services-nso-${V}.pdf"

      - name: Upload PDF gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-quality-reports
          path: |
            verapdf-report*.xml
            verapdf.stderr
            bookmark-report*.txt
          if-no-files-found: ignore

      - name: Instructor leakage guard (FR37, Story 5.6)
        run: python3 scripts/check_instructor_leak.py site/

      - name: Check noindex + no sitemap (Story 3.8, NFR-S8)
        run: python3 scripts/check_noindex.py site/

      - name: Quality gates — perf budget, links, Lighthouse, axe warn (Story 3.11)
        run: bash scripts/ci/run_quality_gates.sh site

      - name: Upload Lighthouse JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-json
          path: |
            lh-home.json
            lh-lab8.json
          if-no-files-found: ignore

      - name: Build instructor site
        run: make build-instructor

      - name: Check noindex on instructor build (NFR-S8)
        run: python3 scripts/check_noindex.py site-instructor/

      - name: Upload learner PDF (release / downstream)
        uses: actions/upload-artifact@v4
        with:
          name: learner-pdf
          path: dist/cisco-secure-services-nso-*.pdf
          if-no-files-found: error

      # To block merges on any lint violation, switch lint step to: make lint-fail-all
      # See docs/lint-cutover-plan.md for the warn → fail playbook.
