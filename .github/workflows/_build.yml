# Reusable CI — learner + instructor builds, PDF, PDF gates, quality gates (Story 6.7, AR9).
name: CI build

on:
  workflow_call:
    inputs:
      check_pr_title:
        description: Enforce Conventional Commits on PR title (skipped for push/tag)
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Story 6.10 — warn until serious/critical axe issues are cleared; set fail to block merges.
      AXE_MODE: warn
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-toolchain
        with:
          install_npm: "true"
          install_chromium: "true"

      - name: Validate PR title (Conventional Commits, AR19)
        if: inputs.check_pr_title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if echo "$TITLE" | grep -qE '^(feat|fix|docs|chore|ci|refactor|lint|content)(\([a-zA-Z0-9._-]+\))?: .+'; then
            echo "OK: PR title matches Conventional Commits."
            exit 0
          fi
          echo "::error::PR title must match Conventional Commits (see CONTRIBUTING.md). Example: docs(ch03): clarify rollback steps"
          echo "Got: $TITLE"
          exit 1

      - name: Authoring lint (rule 12 fail — Story 6.10, UX-DR30)
        id: authoring_lint
        env:
          LINT_RULES_12_MODE: fail
        run: make lint

      - name: Build learner site
        id: build_learner
        run: make build-learner

      - name: Build learner PDF (Story 6.2–6.4)
        id: pdf_build
        run: make pdf

      - name: Install veraPDF (Story 6.5)
        run: bash scripts/ci/install-verapdf-ubuntu.sh

      - name: veraPDF PDF/UA-1 report
        id: verapdf
        env:
          VERAPDF_NON_BLOCKING: "1"
        run: |
          set -euo pipefail
          V="$(python3 scripts/read_nso_version.py)"
          bash scripts/ci/run_verapdf.sh "dist/cisco-secure-services-nso-${V}.pdf"

      - name: Validate PDF bookmarks (Story 6.5)
        id: pdf_bookmarks
        run: |
          set -euo pipefail
          V="$(python3 scripts/read_nso_version.py)"
          python3 scripts/ci/validate-pdf-bookmarks.py "dist/cisco-secure-services-nso-${V}.pdf" \
            --report "bookmark-report-${GITHUB_RUN_ID}.txt"

      - name: External resource allowlist (Story 6.6, FR38/NFR-S3)
        id: external_res
        run: |
          set -euo pipefail
          V="$(python3 scripts/read_nso_version.py)"
          python3 scripts/ci/check-external-resources.py site "dist/cisco-secure-services-nso-${V}.pdf"

      - name: Cisco Confidential classification (Story 6.6, AR18/FR23/NFR-S4)
        id: classification
        run: |
          set -euo pipefail
          V="$(python3 scripts/read_nso_version.py)"
          python3 scripts/ci/check-classification.py site "dist/cisco-secure-services-nso-${V}.pdf"

      - name: Upload PDF gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-quality-reports
          path: |
            verapdf-report*.xml
            verapdf.stderr
            bookmark-report*.txt
          if-no-files-found: ignore

      - name: Instructor leakage guard (FR37, Story 5.6)
        id: instructor_leak
        run: python3 scripts/check_instructor_leak.py site/

      - name: Check noindex + no sitemap (Story 3.8, NFR-S8)
        id: noindex_learner
        run: python3 scripts/check_noindex.py site/

      - name: Quality gates — perf budget, links, Lighthouse, axe (Story 3.11 / 6.10)
        id: quality_gates
        run: bash scripts/ci/run_quality_gates.sh site

      - name: Upload axe merged JSON (Story 6.10)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report-${{ github.run_id }}
          path: axe-report-${{ github.run_id }}.json
          if-no-files-found: warn

      - name: Upload Lighthouse JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-json
          path: |
            lh-home.json
            lh-lab8.json
          if-no-files-found: ignore

      - name: Build instructor site
        id: build_instructor
        run: make build-instructor

      - name: Check noindex on instructor build (NFR-S8)
        id: noindex_instr
        run: python3 scripts/check_noindex.py site-instructor/

      - name: Upload learner PDF (release / downstream)
        uses: actions/upload-artifact@v4
        with:
          name: learner-pdf
          path: dist/cisco-secure-services-nso-*.pdf
          if-no-files-found: error

      - name: Release readiness summary (Story 6.10)
        if: always()
        run: |
          {
            echo "## Release readiness summary"
            echo ""
            echo "| Gate | Outcome |"
            echo "|------|---------|"
            echo "| Authoring lint (rule 12 fail) | ${{ steps.authoring_lint.outcome }} |"
            echo "| Learner HTML | ${{ steps.build_learner.outcome }} |"
            echo "| Learner PDF | ${{ steps.pdf_build.outcome }} |"
            echo "| veraPDF | ${{ steps.verapdf.outcome }} |"
            echo "| PDF bookmarks | ${{ steps.pdf_bookmarks.outcome }} |"
            echo "| External resources | ${{ steps.external_res.outcome }} |"
            echo "| Classification | ${{ steps.classification.outcome }} |"
            echo "| Instructor leakage | ${{ steps.instructor_leak.outcome }} |"
            echo "| noindex (learner) | ${{ steps.noindex_learner.outcome }} |"
            echo "| Quality gates (Lighthouse + axe) | ${{ steps.quality_gates.outcome }} |"
            echo "| Instructor HTML | ${{ steps.build_instructor.outcome }} |"
            echo "| noindex (instructor) | ${{ steps.noindex_instr.outcome }} |"
            echo ""
            echo "Axe mode: \`$AXE_MODE\` (set \`AXE_MODE: fail\` in this workflow to block on serious/critical — see \`docs/_internal/accessibility.md\`)."
          } >> "$GITHUB_STEP_SUMMARY"

      # To block merges on every lint rule, switch lint step to: make lint-fail-all
      # See docs/lint-cutover-plan.md for the warn → fail playbook.
